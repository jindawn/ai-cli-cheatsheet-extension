name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check JavaScript syntax
        run: |
          node --check popup.js
          node --check popup-state.js
          node --check popup-render.js
          node --check popup-toast.js
          node --check popup-dialogs.js
          node --check popup-loader.js
          node --check popup-tasks.js
          node --check pinyin-initials.js
          node --check background.js
          node --check product-core.js
          node --check usage-examples.js
          node --check distribution.js
          find data -name '*.js' -print0 | xargs -0 -n1 node --check
          find enrichments -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Validate cheatsheet data
        run: |
          node tools/validate-data.js
          node tests/test_validation_consistency.js
          node tests/test_global_official_contract.js
          node tests/test_product_core.js
          node tests/test_usage_examples.js
          node tests/test_popup_ux.js
          node tests/test_background.js
          node tests/test_search_quality.js
          node tests/test_packaging.js
          node tools/check-release.js
      - name: Python lint and security scan
        run: |
          pip install ruff bandit
          ruff check native-host tools
          bandit -q -c bandit.yaml -r native-host tools
      - name: Chromium extension smoke test
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install chromium
          xvfb-run -a node tests/test_extension_smoke.js

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run native host tests
        run: python -m unittest discover -s tests -v
