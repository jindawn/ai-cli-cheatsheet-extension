<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI CLI 速查表</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<section id="homeView" class="view active">
  <div class="header">
    <div class="title-row"><div class="brand">🗂 AI CLI 速查表</div><button id="openManage" class="icon-btn" title="管理工具和数据">⚙ 管理</button></div>
    <div class="search-wrap"><span class="search-icon">⌕</span><input id="search" aria-label="搜索命令" placeholder="搜索命令或用途…" autocomplete="off"><kbd class="search-shortcut" aria-hidden="true">/</kbd><button id="clearSearch" title="清空搜索" aria-label="清空搜索">×</button></div>
    <div class="home-toolbar"><div id="quickFilters" class="toolbar" aria-label="常用视图"></div><button id="toggleFilters" class="chip filter-trigger" aria-expanded="false" aria-controls="filterPanel">筛选</button></div>
    <div id="filterSummary" class="filter-summary" aria-live="polite"></div>
    <div id="filterPanel" class="filter-panel" hidden>
      <div class="filter-label">工具</div><div id="toolFilters" class="filters"></div>
      <div class="filter-label">类型</div><div id="categoryFilters" class="filters"></div>
      <div class="filter-label">核验</div><div id="evidenceFilters" class="filters"></div>
      <div class="filter-label">用法</div><div id="exampleFilters" class="filters"></div>
      <div id="shellFilters" class="filters shell-filters" aria-label="Shell 维度筛选"></div>
    </div>
  </div>
  <div id="countBar" class="count-bar" role="status" aria-live="polite"></div>
  <div id="main"></div>
</section>

<section id="manageView" class="view">
  <div class="manage-header"><div class="manage-title"><button id="closeManage" class="icon-btn">← 返回</button><span>管理工具与数据</span></div></div>
  <div class="manage-body">
    <div class="panel">
      <h2>偏好设置</h2>
      <div class="setting-row"><span>当前平台</span><select id="platformSelect"><option value="mac">macOS</option><option value="windows">Windows</option><option value="linux">Linux</option></select></div>
      <div id="manageToolToggles" class="tool-grid"></div>
      <div class="tool-actions"><button id="rerunOnboarding" class="text-btn">重新选择常用工具</button><button id="clearRecent" class="text-btn">清空最近使用</button></div>
    </div>
    <div class="panel">
      <h2>推荐添加</h2>
      <div class="recommend-controls">
        <input id="recommendSearch" type="search" placeholder="搜索推荐工具、类别或标签…" autocomplete="off">
        <label><input type="checkbox" id="showDismissedRecommendations">显示已忽略</label>
      </div>
      <div id="recommendCategories" class="filters"></div>
      <div id="recommendedTools" class="recommend-grid"></div>
      <div class="recommend-ai-row">
        <button id="aiSuggestBtn" class="text-btn">✨ 让 AI 再荐一批</button>
        <span class="meta">需要本地桥接，调用模型会计入用量</span>
      </div>
    </div>
    <div class="panel">
      <details class="maintenance-panel">
        <summary>数据维护与高级操作</summary>
        <div class="setting-row"><label for="webVerifyToggle">新增工具时联网核对（更准但更慢）</label><input type="checkbox" id="webVerifyToggle"></div>
        <h2>工具与来源</h2>
        <div id="manageTools"></div>
        <h2>新增工具</h2>
        <div class="add-row"><input id="addToolName" placeholder="如 Warp / Cursor"><button id="addToolBtn" class="text-btn primary">查询并新增</button></div>
        <div class="meta">需要已安装本地桥接和 Claude Code，会计入正常 Claude 用量。</div>
      </details>
    </div>
    <div id="manageStatus" class="status"></div>
    <button id="cancelTask" class="act" hidden>取消任务</button>
    <div id="pendingPanel" class="panel" hidden></div>
  </div>
</section>

<div id="onboarding" class="onboarding" role="dialog" aria-modal="true" aria-labelledby="onboardTitle">
  <div class="onboard-card" role="document" tabindex="-1">
    <h1 id="onboardTitle">先选择你常用的工具</h1>
    <p>之后首页只展示这些工具。你可以跳过并保留全部，也可以随时在管理页修改。</p>
    <div class="setting-row"><span>使用平台</span><select id="onboardPlatform"><option value="mac">macOS</option><option value="windows">Windows</option><option value="linux">Linux</option></select></div>
    <div class="preset-row" aria-label="常用工具预设"><button class="chip" data-preset="ai">AI CLI</button><button class="chip" data-preset="editors">编辑器</button><button class="chip" data-preset="terminal">Git / Linux / Shell</button><button class="chip" data-preset="all">全部</button></div>
    <div id="onboardTools" class="tool-grid"></div>
    <div class="onboard-actions"><button id="skipOnboarding" class="text-btn">跳过，显示全部</button><button id="saveOnboarding" class="text-btn primary">保存偏好</button></div>
  </div>
</div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<div id="riskDialog" class="risk-dialog" role="dialog" aria-modal="true" aria-labelledby="riskTitle">
  <div class="risk-card" role="document" tabindex="-1">
    <h2 id="riskTitle">复制前确认高风险命令</h2>
    <p id="riskSummary"></p>
    <div id="riskCommand" class="risk-command"></div>
    <ul id="riskDetails" class="risk-list"></ul>
    <div class="risk-actions"><button id="riskCancel" class="text-btn">取消</button><button id="riskConfirm" class="text-btn primary">确认复制</button></div>
  </div>
</div>

<script src="data/index.js"></script>
<script src="pinyin-initials.js"></script>
<script src="product-core.js"></script>
<script src="quality-core.js"></script>
<script src="enrichments/antigravity-cli.js"></script>
<script src="enrichments/claude-code.js"></script>
<script src="enrichments/codex.js"></script>
<script src="enrichments/gemini-cli.js"></script>
<script src="enrichments/openclaw.js"></script>
<script src="enrichments/opencode.js"></script>
<script src="enrichments/migrated-antigravity-cli.js"></script>
<script src="enrichments/migrated-claude-code.js"></script>
<script src="enrichments/migrated-codex.js"></script>
<script src="enrichments/migrated-cursor.js"></script>
<script src="enrichments/migrated-gemini-cli.js"></script>
<script src="enrichments/migrated-git.js"></script>
<script src="enrichments/migrated-idea.js"></script>
<script src="enrichments/migrated-linux.js"></script>
<script src="enrichments/migrated-openclaw.js"></script>
<script src="enrichments/migrated-opencode.js"></script>
<script src="enrichments/migrated-typora.js"></script>
<script src="enrichments/migrated-vs-code.js"></script>
<script src="usage-examples.js"></script>
<script src="popup-state.js"></script>
<script src="popup-render.js"></script>
<script src="popup-toast.js"></script>
<script src="popup-dialogs.js"></script>
<script src="popup-loader.js"></script>
<script src="popup-tasks.js"></script>
<script src="popup.js"></script>
</body>
</html>
